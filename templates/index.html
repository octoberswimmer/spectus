<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AER Sales Kanban</title>
  <link rel="stylesheet" href="/static/app.css?v={{.StaticVersion}}">
  <script src="/static/wasm_exec.js?v={{.StaticVersion}}"></script>
</head>
<body>
  <div class="background-glow" aria-hidden="true"></div>
  <div id="app" class="app-root">
    <div class="loading">Loading…</div>
  </div>

  <script>
    window.kanbanConfig = {{.ConfigJSON}};

    (async () => {
      const resp = await fetch("/session");
      const sessionJSON = resp.ok ? await resp.text() : "";

      const wasmResp = await fetch("/static/main.wasm?v={{.StaticVersion}}");
      if (!wasmResp.ok) {
        const pre = document.createElement('pre');
        pre.innerText = await wasmResp.text();
        document.body.appendChild(pre);
        return;
      }

      const src = await wasmResp.arrayBuffer();
      const go = new Go();
      const result = await WebAssembly.instantiate(src, go.importObject);
      go.run(result.instance);

      if (typeof startWithDiv === 'function') {
        startWithDiv(document.getElementById('app'), sessionJSON, JSON.stringify(window.kanbanConfig || {}));
      }
    })();
  </script>
</body>
</html>
